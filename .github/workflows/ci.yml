name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true

      - name: Tidy
        run: go mod tidy

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Unit tests
        run: go test ./internal/controller/... -run 'Test[^C]' -v

      - name: Install setup-envtest
        run: go install sigs.k8s.io/controller-runtime/tools/setup-envtest@latest

      - name: Integration tests
        run: |
          KUBEBUILDER_ASSETS=$(setup-envtest use 1.31 -p path)
          export KUBEBUILDER_ASSETS
          go test ./internal/controller/... -run TestControllers -v -timeout 120s
