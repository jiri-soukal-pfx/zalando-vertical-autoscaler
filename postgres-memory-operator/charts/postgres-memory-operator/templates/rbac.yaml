---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "postgres-memory-operator.fullname" . }}-manager
  labels:
    {{- include "postgres-memory-operator.labels" . | nindent 4 }}
rules:
# Own CRD
- apiGroups: ["pricefx.io"]
  resources: ["postgresmemorypolicies"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
- apiGroups: ["pricefx.io"]
  resources: ["postgresmemorypolicies/status"]
  verbs: ["get", "update", "patch"]
- apiGroups: ["pricefx.io"]
  resources: ["postgresmemorypolicies/finalizers"]
  verbs: ["update"]
# VPA
- apiGroups: ["autoscaling.k8s.io"]
  resources: ["verticalpodautoscalers"]
  verbs: ["get", "list", "watch"]
# Zalando PostgreSQL CR
- apiGroups: ["acid.zalan.do"]
  resources: ["postgresqls"]
  verbs: ["get", "list", "watch", "patch", "update"]
# Workloads for post-actions
- apiGroups: ["apps"]
  resources: ["deployments", "statefulsets", "daemonsets"]
  verbs: ["get", "list", "watch", "patch", "update"]
# Events
- apiGroups: [""]
  resources: ["events"]
  verbs: ["create", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "postgres-memory-operator.fullname" . }}-manager
  labels:
    {{- include "postgres-memory-operator.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "postgres-memory-operator.fullname" . }}-manager
subjects:
- kind: ServiceAccount
  name: {{ include "postgres-memory-operator.serviceAccountName" . }}
  namespace: {{ .Release.Namespace }}
---
# Leader election role (needed when leaderElect=true)
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "postgres-memory-operator.fullname" . }}-leader-election
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "postgres-memory-operator.labels" . | nindent 4 }}
rules:
- apiGroups: [""]
  resources: ["configmaps"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
- apiGroups: ["coordination.k8s.io"]
  resources: ["leases"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
- apiGroups: [""]
  resources: ["events"]
  verbs: ["create", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "postgres-memory-operator.fullname" . }}-leader-election
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "postgres-memory-operator.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "postgres-memory-operator.fullname" . }}-leader-election
subjects:
- kind: ServiceAccount
  name: {{ include "postgres-memory-operator.serviceAccountName" . }}
  namespace: {{ .Release.Namespace }}
